<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
<title>Mihnah Renderer — Fast Mode</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
  .box { text-align: center; max-width: 500px; background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .bar { height: 12px; background: #334155; border-radius: 6px; margin: 20px 0; overflow: hidden; }
  .fill { height: 100%; background: linear-gradient(90deg, #3fe890, #60f8b0); width: 0%; transition: width 0.3s ease; }
  h2 { margin-bottom: 5px; font-size: 1.3rem; }
  p { color: #94a3b8; font-size: 0.9rem; margin: 5px 0 0; }
  .speed-badge { display: inline-block; background: #3fe890; color: #0f172a; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; margin-top: 10px; }
</style>
</head>
<body>
<div class="box">
  <h2 id="status">🔄 جاري تهيئة المحرك...</h2>
  <p id="detail">يرجى الانتظار، هذه المرة فقط</p>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <div class="speed-badge">⚡ وضع السرعة مفعّل</div>
</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
<script>
const ffmpeg = FFmpeg.createFFmpeg({ 
  log: false, 
  corePath: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js',
  mainScriptUrlOrBlob: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js'
});
const WORKER = 'https://video-builder-proxy.mhhj032009.workers.dev';

// إرسال إشارة الجاهزية
window.addEventListener('load', () => {
  parent.postMessage({ action: 'iframe-active' }, '*');
});

// استقبال أمر الرندرة
window.addEventListener('message', async (e) => {
  if (e.data?.action !== 'render') return;
  await runRender(e.data.project);
});

async function runRender(project) {
  const scenes = project.scenes || [];
  if (!scenes.length) return reportError('لا توجد مشاهد للمعالجة');

  try {
    // 1️⃣ تحميل FFmpeg
    update('⏳ تحميل محرك الرندرة...', 'قد يستغرق 10-20 ثانية لأول مرة', 5);
    if (!ffmpeg.isLoaded()) await ffmpeg.load();
    update('✅ المحرك جاهز', `جاري تجهيز ${scenes.length} مشهد`, 10);

    // 2️⃣ توليد الأصوات (متوازي للسرعة)
    update('🔊 جاري توليد الأصوات...', `0 / ${scenes.length}`, 15);
    const audioPromises = scenes.map(async (sc, i) => {
      const res = await fetch(`${WORKER}/api/tts`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text: sc.text, voice: sc.voice || 'ar-SA-ZariyahNeural', rate: 1.0 })
      });
      if (!res.ok) throw new Error(`TTS فشل في المشهد ${i+1}`);
      const buf = await res.arrayBuffer();
      ffmpeg.FS('writeFile', `a${i}.wav`, new Uint8Array(buf));
      update('🔊 توليد الأصوات...', `${i+1} / ${scenes.length}`, 15 + ((i+1)/scenes.length)*20);
    });
    await Promise.all(audioPromises);

    // 3️⃣ تحميل الوسائط (مع معالجة الأخطاء)
    update('🖼️ تحميل الخلفيات...', '0%', 35);
    for (let i = 0; i < scenes.length; i++) {
      const sc = scenes[i];
      const filename = `m${i}`;
      
      try {
        if (sc.mediaUrl) {
          const r = await fetch(sc.mediaUrl);
          if (!r.ok) throw new Error('فشل التحميل');
          const b = await r.blob();
          const ext = sc.mediaType === 'video' ? 'mp4' : 'jpg';
          ffmpeg.FS('writeFile', `${filename}.${ext}`, new Uint8Array(await b.arrayBuffer()));
        } else {
          createBlack(`${filename}.jpg`, 1280, 720);
        }
      } catch (err) {
        console.warn(`مشهد ${i+1}: فشل التحميل، استخدام خلفية سوداء`, err);
        createBlack(`${filename}.jpg`, 1280, 720);
      }
      update('🖼️ تحميل الخلفيات...', `${Math.round(((i+1)/scenes.length)*100)}%`, 35 + ((i+1)/scenes.length)*15);
    }

    // 4️⃣ دمج كل مشهد على حدة (تحسين السرعة)
    update('🎬 دمج المشاهد...', 'مشهد 1', 50);
    for (let i = 0; i < scenes.length; i++) {
      const sc = scenes[i];
      const isVid = sc.mediaType === 'video' && sc.mediaUrl;
      const input = isVid ? `m${i}.mp4` : `m${i}.jpg`;
      const output = `scene${i}.mp4`;
      
      // أمر سريع: -preset veryfast + تبسيط الفلاتر
      const cmd = [
        '-y',
        '-i', input,
        '-i', `a${i}.wav`,
        '-c:v', 'libx264',
        '-preset', 'veryfast',  // ⚡ تحسين السرعة
        '-crf', '28',           // جودة متوازنة مع السرعة
        '-c:a', 'aac',
        '-b:a', '128k',
        '-t', String(sc.duration || 5),
        '-shortest',
        '-pix_fmt', 'yuv420p',
        '-vf', isVid ? 
          'scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2' : 
          'scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720', // أسرع من zoompan
        '-movflags', '+faststart',
        output
      ];
      
      await ffmpeg.run(...cmd);
      update('🎬 دمج المشاهد...', `مشهد ${i+1} من ${scenes.length}`, 50 + ((i+1)/scenes.length)*30);
    }

    // 5️⃣ إنشاء قائمة الدمج
    update('📋 تجهيز الدمج النهائي...', '', 85);
    let listContent = '';
    for (let i = 0; i < scenes.length; i++) {
      listContent += `file 'scene${i}.mp4'\n`;
    }
    ffmpeg.FS('writeFile', 'list.txt', new TextEncoder().encode(listContent));

    // 6️⃣ الدمج النهائي (سريع)
    update('🔗 دمج كل المشاهد في فيديو واحد...', '', 90);
    await ffmpeg.run(
      '-f', 'concat',
      '-safe', '0',
      '-i', 'list.txt',
      '-c', 'copy',  // ⚡ نسخ مباشر دون إعادة ترميز = أسرع 10 أضعاف
      '-y',
      'out.mp4'
    );

    // 7️⃣ الإخراج
    update('💾 حفظ الملف النهائي...', '100%', 100);
    const data = ffmpeg.FS('readFile', 'out.mp4');
    const blob = new Blob([data.buffer], { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    
    update('✅ تم التصدير بنجاح!', 'انقر لتحميل الفيديو', 100);
    parent.postMessage({ action: 'render-complete', videoUrl: url }, '*');
    
  } catch (err) {
    console.error('Render error:', err);
    reportError(err.message || 'خطأ غير معروف أثناء الرندر');
  }
}

function createBlack(name, w, h) {
  const c = document.createElement('canvas'); 
  c.width = w; c.height = h;
  const x = c.getContext('2d'); 
  x.fillStyle = '#0f172a'; 
  x.fillRect(0, 0, w, h);
  const d = c.toDataURL('image/jpeg').split(',')[1];
  const b = atob(d); 
  const a = new Uint8Array(b.length);
  for (let i = 0; i < b.length; i++) a[i] = b.charCodeAt(i);
  ffmpeg.FS('writeFile', name, a);
}

function update(status, detail, pct) {
  document.getElementById('status').textContent = status;
  document.getElementById('detail').textContent = detail;
  document.getElementById('fill').style.width = `${Math.min(pct, 100)}%`;
  parent.postMessage({ action: 'progress', percent: pct, status, detail }, '*');
}

function reportError(msg) {
  update('❌ فشل التصدير', msg, 100);
  document.getElementById('status').style.color = '#ff5f5f';
  parent.postMessage({ action: 'render-error', error: msg }, '*');
}
</script>
</body>
</html>
