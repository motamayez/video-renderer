<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
<title>Mihnah Renderer</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
  .box { text-align: center; max-width: 500px; background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .bar { height: 12px; background: #334155; border-radius: 6px; margin: 20px 0; overflow: hidden; }
  .fill { height: 100%; background: linear-gradient(90deg, #3fe890, #60f8b0); width: 0%; transition: width 0.4s ease; }
  h2 { margin-bottom: 5px; }
  p { color: #94a3b8; font-size: 0.9rem; margin: 0; }
</style>
</head>
<body>
<div class="box">
  <h2 id="status">🔄 جاري تهيئة المحرك...</h2>
  <p id="detail">يرجى الانتظار، هذه المرة فقط</p>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
<script>
const ffmpeg = FFmpeg.createFFmpeg({ log: true, corePath: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js' });
const WORKER = 'https://video-builder-proxy.mhhj032009.workers.dev';

window.addEventListener('load', () => {
  parent.postMessage({ action: 'iframe-active' }, '*');
});

window.addEventListener('message', async (e) => {
  if (e.data?.action !== 'render') return;
  await runRender(e.data.project);
});

async function runRender(project) {
  try {
    update('⏳ تحميل محرك FFmpeg...', 'قد يستغرق 10-20 ثانية لأول مرة', 5);
    if (!ffmpeg.isLoaded()) await ffmpeg.load();
    update('✅ المحرك جاهز', 'جاري تجهيز المشاهد', 10);

    const scenes = project.scenes || [];
    if (!scenes.length) throw new Error('لا توجد مشاهد');

    // 🔊 توليد الأصوات لجميع المشاهد
    update('🔊 جاري توليد الأصوات...', `0 / ${scenes.length}`, 15);
    for (let i = 0; i < scenes.length; i++) {
      const sc = scenes[i];
      const res = await fetch(`${WORKER}/api/tts`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ text: sc.text, voice: sc.voice || 'ar-SA-ZariyahNeural', rate: 1.0 })
      });
      if (!res.ok) throw new Error(`TTS فشل في المشهد ${i+1}`);
      const buf = await res.arrayBuffer();
      ffmpeg.FS('writeFile', `a${i}.wav`, new Uint8Array(buf));
      update('🔊 توليد الأصوات...', `${i+1} / ${scenes.length}`, 15 + (i/scenes.length)*25);
    }

    // 🖼️ تحميل الوسائط لجميع المشاهد
    update('🖼️ تحميل الخلفيات...', '0%', 45);
    for (let i = 0; i < scenes.length; i++) {
      const sc = scenes[i];
      if (sc.mediaUrl) {
        try {
          const r = await fetch(sc.mediaUrl);
          const b = await r.blob();
          const ext = sc.mediaType === 'video' ? 'mp4' : 'jpg';
          ffmpeg.FS('writeFile', `m${i}.${ext}`, new Uint8Array(await b.arrayBuffer()));
        } catch {
          createBlack(`m${i}.jpg`, 1280, 720);
        }
      } else {
        createBlack(`m${i}.jpg`, 1280, 720);
      }
      update('🖼️ تحميل الخلفيات...', `${Math.round(((i+1)/scenes.length)*100)}%`, 45 + (i/scenes.length)*20);
    }

    // 🎬 دمج كل مشهد على حدة
    update('🎬 دمج المشاهد...', '0%', 70);
    let concatList = '';
    for (let i = 0; i < scenes.length; i++) {
      const sc = scenes[i];
      const isVid = sc.mediaType === 'video' && sc.mediaUrl;
      const inputExt = isVid ? 'mp4' : 'jpg';
      
      const cmd = [
        '-y',
        '-i', `m${i}.${inputExt}`,
        '-i', `a${i}.wav`,
        '-c:v', 'libx264',
        '-c:a', 'aac',
        '-t', String(sc.duration || 5),
        '-shortest',
        '-pix_fmt', 'yuv420p',
        '-vf', isVid ? 'scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2' : 'zoompan=z=min(1+0.1*on/25,1.2):d=125:x=(iw-ow)/2:y=(ih-oh)/2:s=1280x720',
        '-movflags', '+faststart',
        `scene${i}.mp4`
      ];
      
      await ffmpeg.run(...cmd);
      concatList += `file 'scene${i}.mp4'\n`;
      
      const pct = 70 + Math.round(((i+1) / scenes.length) * 20);
      update('🎬 دمج المشاهد...', `${i+1}/${scenes.length}`, pct);
    }

    // دمج جميع المشاهد في فيديو واحد
    update('🔗 دمج الفيديو النهائي...', '90%', 90);
    ffmpeg.FS('writeFile', 'list.txt', concatList);
    await ffmpeg.run('-f', 'concat', '-safe', '0', '-i', 'list.txt', '-c', 'copy', 'final.mp4');

    update('💾 حفظ الملف النهائي...', '95%', 95);
    const data = ffmpeg.FS('readFile', 'final.mp4');
    const blob = new Blob([data.buffer], { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    
    update('✅ تم التصدير بنجاح!', 'انقر لتحميل الفيديو', 100);
    parent.postMessage({ action: 'render-complete', videoUrl: url }, '*');
    
  } catch (err) {
    console.error(err);
    update('❌ خطأ أثناء التصدير', err.message, 100);
    parent.postMessage({ action: 'render-error', error: err.message }, '*');
  }
}

function createBlack(name, w, h) {
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  const x = c.getContext('2d'); x.fillStyle='#0f172a'; x.fillRect(0,0,w,h);
  const d = c.toDataURL('image/jpeg').split(',')[1];
  const b = atob(d); const a = new Uint8Array(b.length);
  for(let i=0;i<b.length;i++) a[i]=b.charCodeAt(i);
  ffmpeg.FS('writeFile', name, a);
}

function update(status, detail, pct) {
  document.getElementById('status').textContent = status;
  document.getElementById('detail').textContent = detail;
  document.getElementById('fill').style.width = `${Math.min(pct,100)}%`;
  parent.postMessage({ action: 'progress', percent: pct, status, detail }, '*');
}
</script>
</body>
</html>
